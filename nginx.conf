# Bloc serveur pour le site Astro statique (à inclure dans la config Nginx du VPS).
# Adapter root si vous utilisez un autre chemin (ex. /var/www/arm-services).

server {
    listen 9000;
    listen [::]:9000;
    server_name _;

    # Chemin où deploy.sh envoie le contenu de dist/
    root /var/www/arm-services;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
